version: '3'

vars:
  ACK_REGEX: '\/(?P<rtt>[0-9-]+)_(?P<bw>[0-9-]+)_(?P<scheduler>[A-Za-z0-9-,]+)_(?P<bytes>[0-9]+)\/(?P<rep>[0-9]+)\/.*sqlog.*'
  RESULTS: results

tasks:
  # --- 1. Plot the figures with the data shown in the paper  ---
  plot-all:
     desc: Plot all paper figures
     cmds:
       - task: plot-sct-paper
       - task: plot-ack-paper
       - task: plot-so-paper

  plot-sct-paper:
    desc: Plot Figure 4 (a) with the data shown in the paper.
    cmds:
      - mkdir -p '{{.RESULTS}}'
      - python3 figures/stream_completion_time.py '{{.RESULTS}}'/sct-paper/10-100*/*/*server.sqlog* --group scheduler --regex "\/.*_(?P<scheduler>[A-Za-z-]+)\/(?P<rep>[0-9]+)\/.*sqlog.*" -o '{{.RESULTS}}/sct.pdf'

  plot-ack-paper:
    desc: Plot Figure 4 (b) with the data shown in the paper.
    cmds:
      - mkdir -p '{{.RESULTS}}'
      - python3 figures/stream_completion_time.py '{{.RESULTS}}'/ack-paper/25-10_10-10_*,fscheduler*_100000/*/*server.sqlog* --regex '{{.ACK_REGEX}}' --group scheduler rtt bw bytes --hide-ylabel -o '{{.RESULTS}}/ack.pdf'

  plot-so-paper:
    desc: Plot Figure 3 with the data shown in the paper.
    cmds:
      - mkdir -p '{{.RESULTS}}'
      - python3 figures/scheduling_overhead_figures.py '{{.RESULTS}}'/so-paper/*/*/*/*timestamps*.csv* --regex "\/(?P<network>[^\/]+)\/(?P<scheduler>[^\/]+)\/(?P<rep>[0-9]+)\/.*timestamps.*" -o '{{.RESULTS}}/so.pdf'

  # 1. Run the measurements ---
  measure-all:
     desc: Run all quicheperf measurements
     cmds:
       - task: mn-run:sct
       - task: mn-run:ack

  mn-run:*:
    desc: Run a specific experiment with mn_runner.py; deletes previous experiment results
    vars:
      EXPERIMENT: '{{index .MATCH 0}}'
      EXP_PATH: '{{joinPath .RESULTS .EXPERIMENT}}'
      USER:
        sh: whoami
    prompt: Really delete '{{.EXP_PATH}}' and run mn_runner.py '{{.EXPERIMENT}}'?
    cmds:
      - rm -rf '{{.EXP_PATH}}' || true
      - sudo python3 emu/mn_runner.py '{{.USER}}' '{{.EXPERIMENT}}' --results '{{.RESULTS}}' --reps 30

  # --- 2b. Run the scheduler experiments with timestamp (scheduling overhead) logging ---
  measure-scheduler-timestamps:
     desc: Run the stream (sct) and packet (pkt) scheduler experiments with timestamp logging enabled
     cmds:
       - task: mn-run-timestamp:sct
       - task: mn-run-timestamp:pkt

  mn-run-timestamp:*:
    desc: Run a specific experiment with mn_runner.py and timestamp logging enabled; deletes previous experiment results
    vars:
      EXPERIMENT: "{{index .MATCH 0}}"
      TS_RESULTS: '{{joinPath .RESULTS "timestamp"}}'
      EXP_PATH: "{{joinPath .TS_RESULTS .EXPERIMENT}}"
      USER:
        sh: whoami
    prompt: Really delete '{{.EXP_PATH}}' and run mn_runner.py '{{.EXPERIMENT}}' --timestamp?
    cmds:
      - rm -rf '{{.EXP_PATH}}' || true
      - sudo python3 emu/mn_runner.py '{{.USER}}' '{{.EXPERIMENT}}' --results '{{.TS_RESULTS}}' --reps 30 --timestamp

  # --- 3. Plot the data from the emulation ---
  plot-sct-emu:
    desc: Plot the data of your own emulation run from `task mn-run:sct`
    cmds:
      - mkdir -p '{{.RESULTS}}'
      - python3 figures/stream_completion_time.py '{{.RESULTS}}'/sct/*/*/*server.sqlog* --group scheduler --regex "\/(?P<scheduler>[A-Za-z-]+)\/(?P<rep>[0-9]+)\/.*sqlog.*" -o '{{.RESULTS}}/sct_10-100.pdf'
    preconditions:
      - sh: test -d '{{.RESULTS}}/sct' 
        msg: 'Run task mn-run:sct to generate data'

  plot-ack-emu:
    desc: Plot the data of your own emulation run from `task mn-run:ack`
    cmds:
      - mkdir -p '{{.RESULTS}}'
      - python3 figures/stream_completion_time.py '{{.RESULTS}}'/ack/25-10_10-10_*,fscheduler*_100000/*/*server.sqlog* --regex '{{.ACK_REGEX}}' --group scheduler rtt bw bytes --hide-ylabel -o '{{.RESULTS}}/ack.pdf'
    preconditions:
      - sh: test -d '{{.RESULTS}}/ack'
        msg: "Run task mn-run:ack to generate data"

  plot-timestamp-emu:
    desc: Plot the timestamp overhead of your own emulation run from `task mn-run:timestamp`
    cmds:
      - mkdir -p '{{.RESULTS}}'
      - python3 figures/scheduling_overhead_figures.py '{{.RESULTS}}'/timestamp/*/*/*/*timestamps*.csv* --regex "\/(?P<network>[^\/]+)\/(?P<scheduler>[^\/]+)\/(?P<rep>[0-9]+)\/.*timestamps.*" -o '{{.RESULTS}}/timestamp/so.pdf'
    preconditions:
      - sh: test -d '{{.RESULTS}}/timestamp'
        msg: "Run task mn-run:timestamp to generate data"
